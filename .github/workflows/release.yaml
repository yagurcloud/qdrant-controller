name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Build and push controller image
        run: |
          VERSION=${{ github.ref_name }}
          docker build -t ghcr.io/${{ github.repository_owner }}/controller:${VERSION#v} .
          docker push ghcr.io/${{ github.repository_owner }}/controller:${VERSION#v}

      - name: Build and push Helm chart
        run: |
          make manifests generate build-installer
          VERSION=${{ github.ref_name }}
          helm package dist/chart/ --version ${VERSION#v}
          helm push qdrant-controller-${VERSION#v}.tgz oci://ghcr.io/${{ github.repository_owner }}/helm
