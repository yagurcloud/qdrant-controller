# This rule is not used by the project yagur-controllers itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the qdrant.yagur.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: yagur-controllers
    app.kubernetes.io/managed-by: kustomize
  name: collection-editor-role
rules:
- apiGroups:
  - qdrant.yagur.io
  resources:
  - collections
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - qdrant.yagur.io
  resources:
  - collections/status
  verbs:
  - get
