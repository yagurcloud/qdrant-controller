---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - qdrant.yagur.io
  resources:
  - collections
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - qdrant.yagur.io
  resources:
  - collections/finalizers
  verbs:
  - update
- apiGroups:
  - qdrant.yagur.io
  resources:
  - collections/status
  verbs:
  - get
  - patch
  - update
