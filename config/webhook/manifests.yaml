---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-qdrant-yagur-io-v1alpha1-collection
  failurePolicy: Fail
  name: mcollection-v1alpha1.kb.io
  rules:
  - apiGroups:
    - qdrant.yagur.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - collections
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-qdrant-yagur-io-v1alpha1-collection
  failurePolicy: Fail
  name: vcollection-v1alpha1.kb.io
  rules:
  - apiGroups:
    - qdrant.yagur.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - collections
  sideEffects: None
