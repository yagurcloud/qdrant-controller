apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  name: {{ include "yagur-controllers.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
- apiGroups:
  - qdrant.yagur.io
  resources:
  - collections
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - qdrant.yagur.io
  resources:
  - collections/finalizers
  verbs:
  - update
- apiGroups:
  - qdrant.yagur.io
  resources:
  - collections/status
  verbs:
  - get
  - patch
  - update
