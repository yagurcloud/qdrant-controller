spec:
  dnsNames:
  - yagur-controllers-webhook-service.yagur-controllers-system.svc
  - yagur-controllers-webhook-service.yagur-controllers-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: yagur-controllers-selfsigned-issuer
  secretName: webhook-server-cert
---
apiVersion: cert-manager.io/v1
