  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: yagur-controllers
  name: yagur-controllers-metrics-certs
  namespace: yagur-controllers-system
spec:
  dnsNames:
  - SERVICE_NAME.SERVICE_NAMESPACE.svc
  - SERVICE_NAME.SERVICE_NAMESPACE.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: yagur-controllers-selfsigned-issuer
  secretName: metrics-server-cert
---
apiVersion: cert-manager.io/v1
